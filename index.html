<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>区域管控 · 扩容修复 + 三级条形列表</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI','微软雅黑',system-ui,sans-serif; }
        body { background:#0a0a12; color:#eef2ff; min-height:100vh; }
        .login-page { display:flex; justify-content:center; align-items:center; min-height:100vh; background:linear-gradient(135deg, #0f0c29, #302b63, #24243e); position:relative; overflow:hidden; }
        .login-page::before { content:""; position:absolute; width:200%; height:200%; background:radial-gradient(circle at 20% 50%, rgba(79,111,175,0.15) 0%, transparent 50%), radial-gradient(circle at 80% 20%, rgba(245,175,25,0.1) 0%, transparent 50%); animation:floatBg 8s infinite alternate; }
        @keyframes floatBg { 0%{transform:translate(0,0);} 100%{transform:translate(-5%,-5%);} }
        .login-container { position:relative; width:400px; background:rgba(20,20,35,0.8); backdrop-filter:blur(20px); border-radius:32px; padding:40px 30px; box-shadow:0 20px 50px rgba(0,0,0,0.6),0 0 0 1px rgba(255,255,255,0.1); text-align:center; z-index:1; }
        .login-container h2 { margin-bottom:8px; color:#fff; font-weight:600; font-size:2rem; letter-spacing:2px; }
        .login-container .subtitle { color:#aaa; margin-bottom:30px; font-size:0.9rem; }
        .input-group { position:relative; margin-bottom:20px; }
        .input-group .input-icon { position:absolute; left:15px; top:50%; transform:translateY(-50%); color:#8aaaff; font-size:1.2rem; }
        .login-container input { width:100%; padding:14px 20px 14px 45px; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15); border-radius:60px; color:white; font-size:1rem; outline:none; transition:0.3s; }
        .login-container input:focus { border-color:#4f6faf; background:rgba(255,255,255,0.12); }
        .login-container button { width:100%; padding:14px; margin-top:15px; background:linear-gradient(90deg, #4f6faf, #6b8fd4); border:none; border-radius:60px; color:white; font-weight:bold; font-size:1.1rem; cursor:pointer; transition:0.3s; box-shadow:0 4px 15px rgba(79,111,175,0.4); }
        .login-container button:hover { box-shadow:0 6px 20px rgba(79,111,175,0.6); }
        .switch { margin-top:20px; font-size:0.9rem; color:#8aaaff; cursor:pointer; text-decoration:none; }
        .switch:hover { color:#aabbff; text-decoration:underline; }
        .remember-me { display:flex; align-items:center; justify-content:flex-start; gap:8px; margin:15px 0 0; color:#ccc; font-size:0.9rem; cursor:pointer; }
        .remember-me input { width:18px; height:18px; margin:0; cursor:pointer; }
        .error-msg { color:#ff7b72; margin-top:12px; font-size:0.9rem; }
        .app-wrapper { max-width:1600px; margin:0 auto; padding:20px; }
        .app-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; background:#12121c; padding:12px 24px; border-radius:60px; flex-wrap:wrap; }
        .user-info { display:flex; align-items:center; gap:20px; }
        .logout-btn { background:#38384c; border:none; padding:6px 18px; border-radius:40px; cursor:pointer; color:white; }
        .quick-nav { display:flex; gap:12px; align-items:center; flex-wrap:wrap; margin-bottom:15px; background:#1c1c2a; padding:10px 20px; border-radius:60px; }
        .quick-nav button { border:none; border-radius:40px; padding:8px 26px; font-weight:bold; cursor:pointer; font-size:0.95rem; color:white; background:#4f6faf; transition:0.2s; }
        .quick-nav button.active-brand { background:#f5af19; color:#000; }
        .quick-nav .vip-btn { background:linear-gradient(135deg,#f5af19,#f12711); margin-left:auto; }
        .quick-nav .mall-btn { background:#6c5ce7; }
        .quick-nav .extra-btn { background:#2c3e50; }
        .global-search { background:#1c1c2a; border-radius:60px; padding:8px 20px; margin-bottom:20px; display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
        .global-search input { flex:2; background:#2a2a38; border:1px solid #424256; padding:10px 18px; border-radius:60px; color:white; font-size:0.9rem; outline:none; }
        .global-search button { background:#4f6faf; border:none; padding:10px 24px; border-radius:60px; color:white; font-weight:bold; cursor:pointer; }
        .search-results { background:#12121c; border-radius:28px; padding:16px; margin-bottom:20px; max-height:400px; overflow-y:auto; }
        .search-result-item { background:#1e1e2c; margin:8px 0; padding:12px 16px; border-radius:20px; cursor:pointer; display:flex; justify-content:space-between; align-items:center; transition:0.15s; }
        .search-result-item:hover { background:#2a2a3c; }
        .mode-bar { display:flex; justify-content:center; gap:20px; margin-bottom:20px; }
        .mode-btn { background:#2c2c3a; border:none; padding:10px 32px; border-radius:60px; font-size:1rem; font-weight:bold; cursor:pointer; color:#ccc; transition:0.2s; }
        .mode-btn.active { background:#4f6faf; color:white; box-shadow:0 0 8px #4f6faf; }
        .admin-tabs { display:flex; gap:12px; margin-bottom:20px; border-bottom:1px solid #2c2c3c; padding-bottom:10px; flex-wrap:wrap; align-items:center; }
        .admin-tab { background:none; border:none; padding:8px 20px; border-radius:40px; color:#ccc; cursor:pointer; position:relative; }
        .admin-tab.active { background:#4f6faf; color:white; }
        .badge { background:#f12711; color:white; border-radius:30px; padding:2px 8px; font-size:0.7rem; margin-left:6px; }
        .brand-selector { margin-left:auto; display:flex; gap:6px; }
        .brand-selector button { border:none; border-radius:30px; padding:5px 14px; font-size:0.8rem; cursor:pointer; background:#2c2c3a; color:#ccc; }
        .brand-selector button.active-brand { background:#f5af19; color:#000; }
        .main-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:20px; margin-bottom:35px; }
        .area-card { background:#181824; border-radius:28px; padding:16px 12px; display:flex; flex-direction:column; gap:12px; border:1px solid #2c2c3c; }
        .area-name-input, .area-name-display { background:#252532; border:1px solid #3e3e52; border-radius:60px; padding:10px 12px; text-align:center; color:white; font-size:0.9rem; outline:none; }
        .enter-area-btn { background:linear-gradient(95deg,#2a3b60,#1e2a46); border:none; padding:12px 8px; border-radius:40px; font-weight:bold; cursor:pointer; color:white; }
        .level-page { background:#12121c; border-radius:32px; padding:20px 24px; border:1px solid #2a2a3a; margin-top:10px; }
        .nav-bar { display:flex; align-items:center; gap:15px; flex-wrap:wrap; margin-bottom:20px; background:#1c1c28; padding:10px 18px; border-radius:60px; }
        .nav-btn { background:#38384c; border:none; padding:8px 20px; border-radius:40px; color:white; cursor:pointer; }
        .breadcrumb { font-size:0.9rem; color:#b9c8ff; background:#0f0f1a; padding:6px 16px; border-radius:32px; }
        .operate-bar { display:flex; flex-wrap:wrap; gap:12px; margin-bottom:24px; background:#1e1e2c; padding:16px 20px; border-radius:28px; align-items:flex-end; }
        .operate-bar input { background:#2a2a38; border:1px solid #424256; padding:8px 14px; border-radius:48px; color:white; outline:none; }
        .btn-primary { background:#2c7e4a; padding:8px 22px; border-radius:40px; border:none; color:white; cursor:pointer; }
        .sub-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:18px; margin-top:10px; }
        .node-card { background:#1e1e2c; border-radius:24px; padding:16px; border:1px solid #33334a; display:flex; flex-direction:column; gap:12px; }
        .node-name { font-size:1.2rem; font-weight:bold; text-align:center; padding:8px 0; background:#2a2a3c; border-radius:50px; }
        .list-view { display:flex; flex-direction:column; gap:12px; margin-top:10px; }
        .node-list-item { background:#1e1e2c; border-radius:20px; padding:12px 16px; display:flex; flex-wrap:wrap; align-items:center; justify-content:space-between; gap:10px; border-left:4px solid #4f6faf; }
        .list-name { font-weight:bold; min-width:140px; font-size:1rem; }
        .list-status { min-width:80px; }
        .list-countdown { font-family:monospace; background:#00000040; padding:4px 10px; border-radius:28px; font-weight:bold; min-width:140px; text-align:center; }
        .list-actions { display:flex; flex-wrap:wrap; gap:6px; }
        .list-actions button { border:none; border-radius:32px; padding:5px 12px; font-size:0.7rem; font-weight:bold; cursor:pointer; }
        .ban-badge { background:#c45138; padding:4px 12px; border-radius:40px; display:inline-block; color:white; font-weight:bold; }
        .unban-badge { background:#308a6e; padding:4px 12px; border-radius:40px; display:inline-block; color:white; }
        .countdown-text { font-family:monospace; background:#00000060; padding:5px 8px; border-radius:28px; text-align:center; font-weight:bold; }
        .countdown-red { color:#ff7b72; background:#3c2020; }
        .countdown-green { color:#8effb2; background:#1e3a2a; }
        .card-actions { display:flex; flex-wrap:wrap; justify-content:center; gap:6px; }
        .card-actions button { border:none; border-radius:32px; padding:5px 10px; font-size:0.7rem; font-weight:bold; cursor:pointer; }
        .btn-ban-card { background:#c45138; color:white; }
        .btn-unban-card { background:#308a6e; color:white; }
        .btn-sub-card { background:#4a6ea8; color:white; }
        .btn-enter-card { background:#8f6bb3; color:white; }
        .btn-edit-card { background:#d9952e; color:white; }
        .btn-time-card { background:#6c5ce7; color:white; }
        .btn-del-card { background:#6a6a84; color:white; }
        .empty-tip { text-align:center; padding:40px; background:#1c1c28; border-radius:32px; color:#aaa; }
        .reminder-note { font-size:0.7rem; margin-top:20px; text-align:center; color:#9aa7dd; }
        .audit-panel,.user-panel,.profile-panel { background:#1c1c2a; border-radius:28px; padding:16px; margin-top:20px; border:1px solid #3a3a50; }
        .audit-item,.user-item,.log-item { background:#252535; margin:10px 0; padding:12px; border-radius:20px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; }
        .btn-approve { background:#2c7e4a; color:white; margin:0 4px; padding:4px 12px; border-radius:30px; border:none; cursor:pointer; }
        .btn-reject { background:#a33; color:white; }
        .btn-edit-user { background:#d9952e; color:white; padding:4px 12px; border-radius:30px; border:none; cursor:pointer; }
        .btn-delete-user { background:#a33; color:white; padding:4px 12px; border-radius:30px; border:none; cursor:pointer; }
        .btn-member { background:#f5af19; color:black; padding:4px 12px; border-radius:30px; border:none; cursor:pointer; font-weight:bold; }
        .btn-demote { background:#6a6a84; color:white; padding:4px 12px; border-radius:30px; border:none; cursor:pointer; }
        .online-badge { background:#2c7e4a; padding:2px 8px; border-radius:20px; font-size:0.7rem; }
        .offline-badge { background:#6a6a84; padding:2px 8px; border-radius:20px; font-size:0.7rem; }
        .vip-badge { background:linear-gradient(135deg,#f5af19,#f12711); padding:2px 8px; border-radius:20px; font-size:0.7rem; color:white; }
        .trial-badge { background:linear-gradient(135deg,#1abc9c,#3498db); padding:2px 8px; border-radius:20px; font-size:0.7rem; color:white; }
        .user-stats { margin-bottom:15px; font-size:0.9rem; background:#2a2a3a; padding:8px 15px; border-radius:40px; display:inline-block; }
        .profile-form { display:flex; flex-direction:column; gap:15px; max-width:400px; }
        .profile-form input { background:#2a2a38; border:1px solid #424256; padding:10px; border-radius:48px; color:white; }
        .modal-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); display:flex; justify-content:center; align-items:center; z-index:999; }
        .modal-content { background:#1e1e2c; padding:24px; border-radius:32px; text-align:center; max-width:90%; box-shadow:0 0 30px rgba(0,0,0,0.6); }
        .modal-content img { max-width:250px; max-height:250px; border-radius:16px; }
        .modal-close { background:#4f6faf; border:none; padding:8px 24px; border-radius:40px; color:white; margin-top:15px; cursor:pointer; }
        .switch-container { display:flex; align-items:center; gap:10px; margin:15px 0; }
        .toggle-switch { position:relative; display:inline-block; width:60px; height:30px; }
        .toggle-switch input { display:none; }
        .slider { position:absolute; cursor:pointer; top:0; left:0; right:0; bottom:0; background-color:#6a6a84; transition:0.4s; border-radius:30px; }
        .slider:before { position:absolute; content:""; height:22px; width:22px; left:4px; bottom:4px; background-color:white; transition:0.4s; border-radius:50%; }
        input:checked + .slider { background-color:#2c7e4a; }
        input:checked + .slider:before { transform:translateX(30px); }
        .home-hero { background:linear-gradient(135deg, #1a1a2e, #16213e); border-radius:32px; padding:60px 30px; margin-bottom:30px; position:relative; overflow:hidden; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:20px; }
        .home-hero::before { content:""; position:absolute; top:-50%; left:-50%; width:200%; height:200%; background:radial-gradient(circle at 30% 70%, rgba(79,111,175,0.2) 0%, transparent 50%); animation:heroFloat 10s infinite alternate; }
        @keyframes heroFloat { 0%{transform:translate(0,0);} 100%{transform:translate(2%,2%);} }
        .hero-left { position:relative; z-index:1; flex:2; }
        .hero-left h1 { font-size:3rem; font-weight:700; margin-bottom:20px; }
        .hero-left p { font-size:1.2rem; color:#aaa; margin-bottom:30px; }
        .hero-right { position:relative; z-index:1; flex:1; background:rgba(0,0,0,0.4); backdrop-filter:blur(10px); border-radius:28px; padding:20px; border:1px solid rgba(255,255,255,0.2); }
        .hero-right h3 { margin-bottom:12px; font-size:1.3rem; color:#f5af19; display:flex; align-items:center; gap:8px; }
        .hero-right .announcement-content { font-size:0.95rem; line-height:1.5; word-break:break-word; max-height:150px; overflow-y:auto; padding-right:5px; }
        .home-btn-enter { background:linear-gradient(90deg, #f5af19, #f12711); border:none; padding:14px 40px; border-radius:60px; font-weight:bold; font-size:1.2rem; color:white; cursor:pointer; display:inline-block; }
        .ad-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:20px; margin-bottom:40px; }
        .ad-card { background:#181824; border-radius:28px; overflow:hidden; border:1px solid #2c2c3c; transition:0.2s; cursor:pointer; }
        .ad-card:hover { transform:translateY(-5px); box-shadow:0 10px 20px rgba(0,0,0,0.4); }
        .ad-card img { width:100%; height:180px; object-fit:cover; border-bottom:1px solid #2c2c3c; }
        .ad-card-body { padding:15px; }
        .ad-card h3 { margin-bottom:8px; }
        .ad-card p { font-size:0.9rem; color:#aaa; }
        .help-buttons { display:flex; gap:20px; justify-content:center; flex-wrap:wrap; margin-bottom:30px; }
        .help-btn { background:#2c3e50; border:none; padding:15px 30px; border-radius:40px; font-weight:bold; font-size:1.1rem; color:white; cursor:pointer; transition:0.2s; display:flex; align-items:center; gap:10px; }
        .help-btn:hover { background:#3e5060; }
        .help-btn img { width:30px; height:30px; border-radius:50%; }
        .btn-jump-log { background:#8f6bb3; color:white; padding:4px 12px; border-radius:30px; border:none; cursor:pointer; font-size:0.7rem; }
        .btn-delete-log { background:#a33; color:white; padding:4px 12px; border-radius:30px; border:none; cursor:pointer; font-size:0.7rem; margin-left:6px; }
        @media (max-width:700px) {
            .sub-grid { grid-template-columns:1fr; }
            .operate-bar { flex-direction:column; align-items:stretch; }
            .quick-nav { justify-content:center; }
            .home-hero { flex-direction:column; text-align:center; }
            .hero-right { width:100%; }
            .node-list-item { flex-direction:column; align-items:flex-start; }
            .list-actions { margin-top:8px; }
        }
    </style>
</head>
<body>
<div id="appContainer"></div>
 <script>
    (function() {
        const BRANDS = ['shengshi', 'chuangshi', 'wansheng', 'jiasheng'];
        const BRAND_NAMES = { shengshi: '万盛', chuangshi: '创世', wansheng: '盛世', jiasheng: '嘉盛' };
        let currentBrand = 'shengshi';
        let currentPage = 'home';

        const STORAGE_USERS = "system_users";
        const STORAGE_CURRENT_USER = "current_user";
        const STORAGE_LAST_ACTIVE = "user_last_active";
        const STORAGE_PENDING = "area_pending_renames";
        const STORAGE_QR_URL = "membership_qr_url";
        const STORAGE_VIP_PRICE = "vip_price_usdt";
        const STORAGE_MALL_URL = "mall_url";
        const STORAGE_MEMBERSHIP_ENABLED = "membership_enabled";
        const STORAGE_EXTRA_LINKS = ["extra_link1", "extra_link2", "extra_link3", "extra_link4"];
        const STORAGE_DIRECT_RENAME = "allow_direct_rename";
        const STORAGE_HOME_ADS = "home_ads";
        const STORAGE_HOME_HELP = "home_help_buttons";
        const STORAGE_REMEMBERED_USER = "remembered_user";
        const STORAGE_OPERATION_LOGS = "operation_logs";
        const STORAGE_LAST_LOG_VIEW = "last_log_view_time";
        const STORAGE_ANNOUNCEMENT = "home_announcement";
        const TOTAL_AREAS = 32;
        const TRIAL_DAYS = 7;

        function brandKey(baseKey) { return `${baseKey}_${currentBrand}`; }

        function addOperationLog(operation, details, areaId = null, nodeId = null) {
            const user = getCurrentUser();
            if (!user) return;
            const logs = JSON.parse(localStorage.getItem(STORAGE_OPERATION_LOGS) || "[]");
            logs.unshift({
                id: Date.now(),
                username: user.username,
                timestamp: new Date().toISOString(),
                brand: currentBrand,
                areaId: areaId,
                nodeId: nodeId,
                operation: operation,
                details: details
            });
            if (logs.length > 1000) logs.pop();
            localStorage.setItem(STORAGE_OPERATION_LOGS, JSON.stringify(logs));
            if (getCurrentUser()?.role === 'admin') updateLogBadge();
        }

        function getOperationLogs() {
            return JSON.parse(localStorage.getItem(STORAGE_OPERATION_LOGS) || "[]");
        }

        function deleteLogById(logId) {
            let logs = getOperationLogs();
            logs = logs.filter(log => log.id !== logId);
            localStorage.setItem(STORAGE_OPERATION_LOGS, JSON.stringify(logs));
            if (getCurrentUser()?.role === 'admin') {
                renderLogsPanel();
                updateLogBadge();
            }
        }

        function getUnreadLogCount() {
            const lastView = localStorage.getItem(STORAGE_LAST_LOG_VIEW) || 0;
            const logs = getOperationLogs();
            return logs.filter(log => new Date(log.timestamp) > new Date(parseInt(lastView))).length;
        }

        function markLogsAsRead() {
            localStorage.setItem(STORAGE_LAST_LOG_VIEW, Date.now().toString());
            updateLogBadge();
        }

        function updateLogBadge() {
            const badgeSpan = document.getElementById("logBadge");
            if (!badgeSpan) return;
            const unread = getUnreadLogCount();
            if (unread > 0) {
                badgeSpan.innerText = unread;
                badgeSpan.style.display = "inline-block";
            } else {
                badgeSpan.style.display = "none";
            }
        }

        function getAnnouncement() {
            return localStorage.getItem(STORAGE_ANNOUNCEMENT) || "欢迎使用区域管控系统！如有问题请联系管理员。";
        }
        function setAnnouncement(content) {
            localStorage.setItem(STORAGE_ANNOUNCEMENT, content);
        }

        // 关键修复：强制初始化正确的用户数据，确保 51888666 存在
        function initStorage() {
            // 先确保用户数据存在且包含正确的管理员
            let users = [];
            if (localStorage.getItem(STORAGE_USERS)) {
                try {
                    users = JSON.parse(localStorage.getItem(STORAGE_USERS));
                    if (!Array.isArray(users)) users = [];
                } catch(e) { users = []; }
            }
            // 检查是否有 51888666 管理员
            const hasAdmin = users.some(u => u.username === '51888666' && u.role === 'admin');
            if (!hasAdmin) {
                // 如果没有，强制覆盖为用户初始数据
                users = [
                    { username: "51888666", password: "51888666", role: "admin", membership: false, freeTrialEnd: 0 },
                    { username: "user", password: "user123", role: "user", membership: false, freeTrialEnd: 0 }
                ];
                localStorage.setItem(STORAGE_USERS, JSON.stringify(users));
            } else {
                // 已有管理员，但可能缺少字段，补充
                let updated = false;
                for (let u of users) {
                    if (u.membership === undefined) { u.membership = false; updated = true; }
                    if (u.freeTrialEnd === undefined) { u.freeTrialEnd = 0; updated = true; }
                }
                if (updated) localStorage.setItem(STORAGE_USERS, JSON.stringify(users));
            }
            // 其余初始化
            if (!localStorage.getItem(STORAGE_LAST_ACTIVE)) localStorage.setItem(STORAGE_LAST_ACTIVE, "{}");
            if (!localStorage.getItem(STORAGE_QR_URL)) localStorage.setItem(STORAGE_QR_URL, "");
            if (!localStorage.getItem(STORAGE_VIP_PRICE)) localStorage.setItem(STORAGE_VIP_PRICE, "10");
            if (!localStorage.getItem(STORAGE_MALL_URL)) localStorage.setItem(STORAGE_MALL_URL, "#");
            if (localStorage.getItem(STORAGE_MEMBERSHIP_ENABLED) === null) {
                localStorage.setItem(STORAGE_MEMBERSHIP_ENABLED, "false");
            }
            STORAGE_EXTRA_LINKS.forEach(key => { if (!localStorage.getItem(key)) localStorage.setItem(key, ""); });
            if (localStorage.getItem(STORAGE_DIRECT_RENAME) === null) {
                localStorage.setItem(STORAGE_DIRECT_RENAME, "false");
            }
            if (!localStorage.getItem(STORAGE_HOME_ADS)) {
                const defaultAds = [];
                for (let i = 0; i < 6; i++) {
                    defaultAds.push({ image: "", title: "广告位 " + (i+1), desc: "描述内容", link: "" });
                }
                localStorage.setItem(STORAGE_HOME_ADS, JSON.stringify(defaultAds));
            }
            if (!localStorage.getItem(STORAGE_HOME_HELP)) {
                const defaultHelp = [

        function searchAllRegions(keyword) {
            if (!keyword.trim()) return [];
            const lowerKw = keyword.toLowerCase();
            const results = [];
            for (let areaIdx = 0; areaIdx < TOTAL_AREAS; areaIdx++) {
                const list = getAreaData(areaIdx + 1);
                for (const node of list) {
                    if (node.name.toLowerCase().includes(lowerKw)) {
                        const fullPath = buildFullPath(node, list);
                        results.push({ areaId: areaIdx + 1, nodeId: node.id, name: node.name, fullPath, parentName: node.parent });
                    }
                }
            }
            return results;
        }
        function buildFullPath(item, allList, visited = new Set()) {
            if (visited.has(item.name + item.parent)) return item.name;
            visited.add(item.name + item.parent);
            let path = item.name, p = item.parent;
            while (p && p !== "") {
                const parentItem = allList.find(x => x.name === p);
                if (!parentItem) break;
                if (visited.has(parentItem.name + parentItem.parent)) break;
                visited.add(parentItem.name + parentItem.parent);
                path = parentItem.name + " → " + path;
                p = parentItem.parent;
            }
            return path;
        }

        function adjustTime(areaId, nodeId) {
            let list = getAreaData(areaId);
            let item = list.find(x => x.id === nodeId);
            if (!item) return;
            if (!item.isBan || !item.startTime) {
                alert("该节点未处于封禁状态，无法调整时间。");
                return;
            }
            let currentDate = new Date(item.startTime * 1000).toLocaleString();
            let input = prompt(`当前封禁开始时间：${currentDate}\n输入调整量（如 +2小时、-30分钟、+1天）：`, "+0小时");
            if (!input) return;
            let totalSeconds = 0;
            const regex = /([+-]?\d+)\s*(天|小时|分钟|h|m|d)/gi;
            let match;
            while ((match = regex.exec(input)) !== null) {
                let num = parseInt(match[1]);
                let unit = match[2].toLowerCase();
                if (unit === '天' || unit === 'd') totalSeconds += num * 86400;
                else if (unit === '小时' || unit === 'h') totalSeconds += num * 3600;
                else if (unit === '分钟' || unit === 'm') totalSeconds += num * 60;
            }
            if (totalSeconds === 0) { alert("未识别有效调整量，请使用如 +2小时、-30分钟"); return; }
            item.startTime += totalSeconds;
            setAreaData(areaId, list);
            addOperationLog("调整封禁时间", `调整了节点"${item.name}"的封禁开始时间，偏移${totalSeconds}秒`, areaId, nodeId);
            if (getCurrentUser()?.role === 'admin') refreshAdminSubGrid();
            else refreshFrontendSubGrid();
        }

        function getNodeDepth(areaId, node) {
            if (!node) return 0;
            let depth = 0;
            let cur = node;
            while (cur && cur.parent && cur.parent !== "") {
                const list = getAreaData(areaId);
                const parent = list.find(x => x.name === cur.parent);
                if (!parent) break;
                cur = parent;
                depth++;
            }
            return depth;
        }

                    card.querySelector('.btn-unban-card')?.addEventListener('click', () => { unbanNode(areaId, child.id); });

                    card.querySelector('.btn-time-card')?.addEventListener('click', () => adjustTime(areaId, child.id));
                    card.querySelector('.btn-del-card')?.addEventListener('click', () => {

                            <button class="admin-tab" data-tab="user">👥 用户管理</button>
                            <button class="admin-tab" data-tab="profile">🔐 个人设置</button>
                            <button class="admin-tab" data-tab="homeSettings">🏠 主页设置</button>
                            <button class="admin-tab" data-tab="announcement">📢 公告设置</button>
                            <button class="admin-tab" data-tab="logs">📜 修改日志 <span id="logBadge" class="badge" style="display:none;">0</span></button>
                            ${adminBrandSelector}
                        </div>
                        <div id="regionTab" style="display:block;"><div id="adminMainGrid" class="main-grid"></div><div id="adminLevelContainer" style="display:none;"></div></div>
                        <div id="auditTab" style="display:none;"><div class="audit-panel"><h3>📋 待审核申请</h3><div id="auditList">加载中...</div></div></div>
                        <div id="userTab" style="display:none;"><div class="user-panel"><h3>👥 用户管理</h3><div id="userPanelList">加载中...</div><div style="margin-top:15px;"><button id="addUserBtn" class="btn-primary">➕ 添加新用户</button></div></div></div>
                        <div id="profileTab" style="display:none;"><div id="profilePanel"></div></div>
                        <div id="homeSettingsTab" style="display:none;"><div id="homeSettingsContainer"></div></div>
                        <div id="announcementTab" style="display:none;"><div id="announcementPanel"></div></div>
                        <div id="logsTab" style="display:none;"><div id="logsPanel"></div></div>
                    </div>
                    <div id="frontendView" style="display:${isAdmin?'none':'block'};"><h3>🏢 ${BRAND_NAMES[currentBrand]} 前台信息平台</h3><div id="frontendMainGrid" class="main-grid"></div><div id="frontendLevelContainer" style="display:none;"></div><div class="reminder-note">💡 您拥有完整管控权限（封禁/解禁/添加/删除/修改天数/调整时间），所有操作会被记录。（区县级以下自动变为条形列表）</div></div>
                </div>
            `;
            document.getElementById("backHomeBtn")?.addEventListener("click", () => {
                currentPage = 'home';
                renderApp(getCurrentUser());
            });
            document.querySelectorAll(".quick-nav .jump-btn").forEach(btn => {
                btn.addEventListener("click", () => { const brand = btn.dataset.brand; if (brand !== currentBrand) switchBrand(brand); });
            });
            document.querySelectorAll(".brand-selector button").forEach(btn => {
                btn.addEventListener("click", () => { const brand = btn.dataset.brand; if (brand !== currentBrand) switchBrand(brand); });
            });
            document.getElementById("mallBtn")?.addEventListener("click", () => {
                const url = getMallUrl();
                if(url && url !== '#') window.open(url, '_blank');
                else alert("商城链接尚未配置，请联系管理员。");
            });
            document.querySelectorAll(".extra-btn").forEach(btn => {
                btn.addEventListener("click", () => {
                    const index = parseInt(btn.dataset.linkIndex);
                    const url = getExtraLink(index);
                    if (url && url.trim() !== '') {
                        window.open(url, '_blank');
                    } else {
                        alert(`链接${index+1}未配置，请在后台用户管理页面底部设置。`);
                    }
                });
            });
            if (!isAdmin && membershipOn) {
                document.getElementById("openVipBtn")?.addEventListener("click", showMembershipModal);
            }
            if (isAdmin) {
                renderAdminMainPanel(); renderAuditPanel(); renderUserPanel(); renderProfilePanel(); renderLogsPanel(); renderAnnouncementPanel();
                updateLogBadge();
                setInterval(() => {
                    if (document.getElementById("logsTab") && document.getElementById("logsTab").style.display !== "block") {
                        updateLogBadge();
                    }
                }, 30000);
                document.getElementById("addUserBtn")?.addEventListener("click", () => {
                    const newName = prompt("新用户名:"); if (!newName) return;
                    const newPwd = prompt("密码:"); if (!newPwd) return;
                    if (register(newName, newPwd, "user")) { alert("添加成功，新用户享有7天免费试用。"); renderUserPanel(); }
                    else alert("用户名已存在");
                });
                document.querySelectorAll(".admin-tab").forEach(tab => {
                    tab.addEventListener("click", () => {
                        const target = tab.dataset.tab;
                        document.getElementById("regionTab").style.display = target === 'region' ? 'block' : 'none';
                        document.getElementById("auditTab").style.display = target === 'audit' ? 'block' : 'none';
                        document.getElementById("userTab").style.display = target === 'user' ? 'block' : 'none';
                        document.getElementById("profileTab").style.display = target === 'profile' ? 'block' : 'none';
                        document.getElementById("homeSettingsTab").style.display = target === 'homeSettings' ? 'block' : 'none';
                        document.getElementById("announcementTab").style.display = target === 'announcement' ? 'block' : 'none';
                        document.getElementById("logsTab").style.display = target === 'logs' ? 'block' : 'none';
                        document.querySelectorAll(".admin-tab").forEach(t => t.classList.remove("active"));
                        tab.classList.add("active");
                        if (target === 'user') renderUserPanel();
                        if (target === 'profile') renderProfilePanel();
                        if (target === 'homeSettings') renderHomeSettingsPanel();
                        if (target === 'announcement') renderAnnouncementPanel();
                        if (target === 'logs') renderLogsPanel();
                    });
                });
                document.getElementById("adminModeBtn")?.addEventListener("click", () => { 
                    document.getElementById("adminView").style.display="block"; 
                    document.getElementById("frontendView").style.display="none"; 
                    document.getElementById("adminModeBtn").classList.add("active"); 
                    document.getElementById("frontendModeBtn").classList.remove("active"); 
                });
                document.getElementById("frontendModeBtn")?.addEventListener("click", () => { 
                    document.getElementById("adminView").style.display="none"; 
                    document.getElementById("frontendView").style.display="block"; 
                    document.getElementById("frontendModeBtn").classList.add("active"); 
                    document.getElementById("adminModeBtn").classList.remove("active"); 
                    renderFrontendMainPanel(); 
                });
            }
            renderFrontendMainPanel();
            document.getElementById("logoutBtn")?.addEventListener("click", logout);
            document.getElementById("searchBtn")?.addEventListener("click", () => showSearchResults(document.getElementById("globalSearchInput").value));
            document.getElementById("globalSearchInput")?.addEventListener("keypress", (e) => { if (e.key === 'Enter') showSearchResults(e.target.value); });
            setInterval(() => {
                if (currentFrontAreaId) refreshFrontendSubGrid();
                if (isAdmin && currentAdminAreaId) refreshAdminSubGrid();
                const cur = getCurrentUser(); if (cur) updateActiveTime(cur.username);
            }, 5000);
        }

        function getNextId(list) { return list.length === 0 ? 1 : Math.max(...list.map(i => i.id)) + 1; }

        initStorage();
        const initialUser = getCurrentUser() || autoLoginFromRemembered();
        if (initialUser && getCurrentUser()) {
            renderHomePage();
        } else {
            renderApp(null);
        }
    })();
</script>
</body>
</html>
